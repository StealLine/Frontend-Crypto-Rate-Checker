<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — CryptoVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2e;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --success: #4ade80;
            --error: #f87171;
            --warn: #fb923c;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 40% 30% at 10% 10%, rgba(108,99,255,.08) 0%, transparent 60%), radial-gradient(ellipse 30% 25% at 90% 90%, rgba(255,101,132,.06) 0%, transparent 60%);
                pointer-events: none;
                z-index: 0;
            }

        /* ── Nav ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(10,10,15,.85);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-user {
            font-size: 14px;
            color: var(--muted);
        }

            .nav-user span {
                color: var(--text);
                font-weight: 500;
            }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: border-color .2s, color .2s;
        }

            .btn-logout:hover {
                border-color: var(--error);
                color: var(--error);
            }

        /* ── Main ── */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px;
            position: relative;
            z-index: 1;
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .greeting-sub {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 48px;
        }

        /* ── Crypto section ── */
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        /* Coin selector */
        .coin-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .coin-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

            .coin-btn:hover {
                border-color: var(--accent);
                background: var(--surface2);
            }

            .coin-btn.active {
                border-color: var(--accent);
                background: rgba(108,99,255,.12);
                color: #fff;
            }

        .coin-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        /* Price card */
        .price-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .3s;
        }

            .price-card.loaded {
                border-color: rgba(108,99,255,.3);
            }

        .price-inner {
            text-align: center;
            width: 100%;
        }

        .price-coin {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .price-coin-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        .price-coin-name {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 600;
        }

        .price-value {
            font-family: 'DM Mono', monospace;
            font-size: 44px;
            font-weight: 500;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .price-change {
            font-size: 14px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

            .price-change.up {
                background: rgba(74,222,128,.1);
                color: var(--success);
            }

            .price-change.down {
                background: rgba(248,113,113,.1);
                color: var(--error);
            }

        .price-placeholder {
            color: var(--muted);
            font-size: 15px;
        }

        .price-loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 14px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            margin-top: 16px;
            transition: border-color .2s, color .2s;
        }

            .refresh-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

        .last-updated {
            color: var(--muted);
            font-size: 11px;
            margin-top: 8px;
            font-family: 'DM Mono', monospace;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">CryptoVault</div>
        <div class="nav-right">
            <div class="nav-user">Signed in as <span id="navUsername">...</span></div>
            <button class="btn-logout" onclick="doLogout()">Sign out</button>
        </div>
    </nav>

    <main>
        <div class="greeting">Hello, <span id="greetUsername">...</span> 👋</div>
        <p class="greeting-sub">Live cryptocurrency prices, just for you.</p>

        <div class="section-title">Select Asset</div>

        <div class="coin-grid" id="coinGrid">
            <button class="coin-btn" onclick="selectCoin('bitcoin','BTC','#f7931a')">
                <div class="coin-icon" style="background:rgba(247,147,26,.15);color:#f7931a">₿</div>
                Bitcoin
            </button>
            <button class="coin-btn" onclick="selectCoin('ethereum','ETH','#627eea')">
                <div class="coin-icon" style="background:rgba(98,126,234,.15);color:#627eea">Ξ</div>
                Ethereum
            </button>
            <button class="coin-btn" onclick="selectCoin('solana','SOL','#9945ff')">
                <div class="coin-icon" style="background:rgba(153,69,255,.15);color:#9945ff">◎</div>
                Solana
            </button>
            <button class="coin-btn" onclick="selectCoin('binancecoin','BNB','#f3ba2f')">
                <div class="coin-icon" style="background:rgba(243,186,47,.15);color:#f3ba2f">B</div>
                BNB
            </button>
            <button class="coin-btn" onclick="selectCoin('ripple','XRP','#00aae4')">
                <div class="coin-icon" style="background:rgba(0,170,228,.15);color:#00aae4">✕</div>
                XRP
            </button>
            <button class="coin-btn" onclick="selectCoin('cardano','ADA','#0033ad')">
                <div class="coin-icon" style="background:rgba(0,51,173,.15);color:#4a7fff">₳</div>
                Cardano
            </button>
        </div>

        <div class="price-card" id="priceCard">
            <div class="price-placeholder">← Select a cryptocurrency to see live price</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:12px">
            <button class="refresh-btn" id="refreshBtn" onclick="refreshPrice()" style="display:none">↻ Refresh</button>
            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </main>

    <script>
    let currentCoin = null;
    let currentSymbol = null;
    let currentColor = null;

    // Auth guard
    fetch('/api/Auth/Me').then(r => r.json()).then(d => {
      if (!d.authenticated) {
        location.href = 'login.html';
        return;
      }
      document.getElementById('navUsername').textContent = d.username;
      document.getElementById('greetUsername').textContent = d.username;
    });

    function selectCoin(id, symbol, color) {
      currentCoin   = id;
      currentSymbol = symbol;
      currentColor  = color;

      document.querySelectorAll('.coin-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');

      fetchPrice();
    }

    async function fetchPrice() {
      if (!currentCoin) return;

      const card = document.getElementById('priceCard');
      card.className = 'price-card';
      card.innerHTML = `<div class="price-loading"><div class="spinner"></div> Fetching ${currentSymbol} price...</div>`;

      try {
        // Using CoinGecko public API — replace with your preferred crypto API
        const res  = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${currentCoin}&vs_currencies=usd&include_24hr_change=true`);
        const data = await res.json();
        const info = data[currentCoin];

        if (!info) throw new Error('No data');

        const price  = info.usd;
        const change = info.usd_24h_change?.toFixed(2) ?? '0.00';
        const isUp   = parseFloat(change) >= 0;

        card.className = 'price-card loaded';
        card.innerHTML = `
          <div class="price-inner">
            <div class="price-coin">
              <div class="price-coin-icon" style="background:rgba(${hexToRgb(currentColor)},.15);color:${currentColor}">${getSymbolGlyph(currentSymbol)}</div>
              <div class="price-coin-name">${currentSymbol} / USD</div>
            </div>
            <div class="price-value">$${formatPrice(price)}</div>
            <div class="price-change ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(change)}% (24h)</div>
          </div>`;

        document.getElementById('refreshBtn').style.display = 'inline-block';
        document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (err) {
        card.innerHTML = `<div class="price-placeholder" style="color:var(--error)">Failed to fetch price. Check your API or try again.</div>`;
      }
    }

    function refreshPrice() { fetchPrice(); }

    function formatPrice(n) {
      if (n >= 1000) return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (n >= 1)    return n.toFixed(4);
      return n.toFixed(6);
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    function getSymbolGlyph(sym) {
      const map = { BTC:'₿', ETH:'Ξ', SOL:'◎', BNB:'B', XRP:'✕', ADA:'₳' };
      return map[sym] || sym[0];
    }

    async function doLogout() {
      await fetch('/api/Auth/Logout', { method: 'POST' });
      location.href = 'login.html';
    }
    </script>
</body>
</html>
